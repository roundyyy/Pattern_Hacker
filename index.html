<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Pattern Hacker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #050d08;
    font-family: 'Courier New', 'Lucida Console', monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    position: relative;
    width: 100%;
    max-width: 420px;
    height: 100vh;
    height: 100dvh;
    background: linear-gradient(170deg, #050d08 0%, #0a1a10 40%, #071210 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    color: #00ff88;
  }
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
    pointer-events: none; z-index: 10;
  }

  /* Splash */
  #splash {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; padding: 24px; gap: 20px; z-index: 2;
  }
  #splash.hidden { display: none; }
  .logo-icon { margin-bottom: 12px; filter: drop-shadow(0 0 20px #00ff8866); animation: float 3s ease-in-out infinite; }
  .title {
    font-size: clamp(2.2rem, 8vw, 3.5rem); font-weight: 700; letter-spacing: 0.3em;
    text-shadow: 0 0 30px #00ff8866, 0 0 60px #00ff8822; color: #00ff88;
  }
  .subtitle {
    font-size: clamp(1.6rem, 6vw, 2.6rem); font-weight: 400; letter-spacing: 0.6em;
    color: #00ddff; text-shadow: 0 0 20px #00ddff66;
  }
  .instructions {
    text-align: center; font-size: clamp(0.75rem, 2.5vw, 0.9rem); line-height: 1.8; color: #00ff8888; max-width: 300;
  }
  .record-badge {
    padding: 6px 18px; border: 1px solid #ffcc0066; border-radius: 4px;
    color: #ffcc00; font-size: 0.85rem; letter-spacing: 0.15em; text-shadow: 0 0 8px #ffcc0044;
  }
  .record-badge.invisible { visibility: hidden; }

  /* Buttons */
  .btn-main {
    background: transparent; border: 2px solid #00ff88; border-radius: 6px;
    padding: 14px 40px; cursor: pointer; color: #00ff88;
    font-size: clamp(1rem, 3vw, 1.2rem); font-weight: 700; letter-spacing: 0.25em;
    font-family: 'Courier New', monospace; text-shadow: 0 0 10px #00ff8866;
    transition: all 0.2s;
  }
  .btn-main:hover { filter: brightness(1.2); }
  .btn-main:active { transform: scale(0.96); }
  .btn-small {
    background: transparent; border: 1px solid #00ff8844; border-radius: 4px;
    padding: 8px 16px; color: #00ff8888; font-size: 0.75rem; cursor: pointer;
    font-family: 'Courier New', monospace; letter-spacing: 0.1em;
  }
  .btn-icon {
    background: transparent; border: 1px solid #00ff8833; border-radius: 50%;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem; color: #00ff88; flex-shrink: 0;
  }
  .btn-icon:hover, .btn-small:hover { filter: brightness(1.2); }

  /* Game screen */
  #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; flex: 1; z-index: 2; }
  #game-screen.active { display: flex; }

  /* HUD */
  .hud {
    display: flex; justify-content: space-between; width: 100%; max-width: 400px;
    padding: 12px 16px 4px; z-index: 2;
  }
  .hud-cell { text-align: center; min-width: 50px; }
  .hud-cell:first-child { text-align: left; }
  .hud-cell:last-child { text-align: right; }
  .hud-label { font-size: 0.55rem; letter-spacing: 0.2em; color: #00ff8866; margin-bottom: 2px; }
  .hud-value { font-size: clamp(0.9rem, 3.2vw, 1.3rem); font-weight: 700; color: #00ff88; text-shadow: 0 0 8px #00ff8844; }

  /* Lives */
  .lives { display: flex; gap: 4px; justify-content: center; height: 22px; align-items: center; z-index: 2; }
  .life { font-size: 1rem; transition: all 0.3s; }
  .life.lost { opacity: 0.2; filter: grayscale(1); }

  /* Info bar */
  .info-bar {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 4px 0; z-index: 2; height: 28px; flex-shrink: 0;
  }
  .combo-badge {
    padding: 2px 12px; background: #00ff8815; border: 1px solid #00ff8833;
    border-radius: 20px; font-size: 0.7rem; letter-spacing: 0.2em; color: #00ff88; font-weight: 700;
    transition: all 0.3s;
  }
  .combo-badge.invisible { visibility: hidden; }
  .combo-badge.milestone-3 { border-color: #00ddff; color: #00ddff; background: #00ddff15; }
  .combo-badge.milestone-5 { border-color: #ffcc00; color: #ffcc00; background: #ffcc0015; }
  .combo-badge.milestone-10 { border-color: #ff66ff; color: #ff66ff; background: #ff66ff15; text-shadow: 0 0 8px #ff66ff66; }
  .timer-display {
    font-size: 0.75rem; letter-spacing: 0.1em; color: #00ddff; font-weight: 700;
  }
  .timer-display.warning { color: #ffcc00; }
  .timer-display.danger { color: #ff3355; animation: pulse 0.5s ease-in-out infinite; }
  .timer-display.invisible { visibility: hidden; }

  /* Bonus info */
  .bonus-bar {
    height: 18px; display: flex; align-items: center; justify-content: center; z-index: 2; flex-shrink: 0;
  }
  .bonus-info {
    font-size: 0.6rem; color: #ffcc00aa; letter-spacing: 0.1em;
  }
  .bonus-info.invisible { visibility: hidden; }

  /* Status */
  .status-area {
    height: 52px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 2; padding: 2px 8px;
    flex-shrink: 0; position: relative;
  }
  .status-text {
    font-size: clamp(0.85rem, 3vw, 1rem); font-weight: 700; letter-spacing: 0.2em; text-align: center;
  }
  .new-record {
    font-size: 0.75rem; color: #ffcc00; margin-top: 2px; letter-spacing: 0.15em;
    animation: pulse 1s ease-in-out infinite; text-shadow: 0 0 10px #ffcc0066;
    position: absolute; bottom: 0;
  }

  /* Grid - larger base to accommodate expansion */
  .grid-container {
    position: relative;
    width: min(86vw, 72vh, 380px);
    height: min(86vw, 72vh, 380px);
    margin: 4px auto;
    z-index: 2; flex-shrink: 0;
  }
  .grid-svg {
    position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
  }
  .node {
    position: absolute; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease-out; cursor: default; z-index: 2;
    touch-action: none;
  }
  .node-inner {
    width: 30%; height: 30%; border-radius: 50%; transition: all 0.15s ease-out;
  }

  /* Progress dots */
  .progress-dots {
    display: flex; gap: 6px; justify-content: center; align-items: center;
    height: 24px; z-index: 2; flex-shrink: 0; flex-wrap: wrap; padding: 0 20px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #00ff8833; transition: background 0.15s; flex-shrink: 0;
  }
  .dot.filled { background: #00ff88; box-shadow: 0 0 6px #00ff88; }

  /* Bottom bar */
  .bottom-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; height: 56px; z-index: 2; flex-shrink: 0; flex-wrap: wrap;
  }
  .btn-repeat {
    background: transparent; border: 1px solid #00ddff55; border-radius: 4px;
    padding: 6px 14px; color: #00ddffaa; font-size: 0.65rem; cursor: pointer;
    font-family: 'Courier New', monospace; letter-spacing: 0.1em; transition: all 0.2s;
  }
  .btn-repeat.invisible { visibility: hidden; pointer-events: none; }
  .btn-repeat:hover { border-color: #00ddff; color: #00ddff; }
  .btn-repeat:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-main.invisible { visibility: hidden; pointer-events: none; }

  /* Decrypt button */
  .btn-decrypt {
    background: transparent; border: 1px solid #ffcc0055; border-radius: 4px;
    padding: 6px 14px; color: #ffcc00aa; font-size: 0.65rem; cursor: pointer;
    font-family: 'Courier New', monospace; letter-spacing: 0.1em; transition: all 0.2s;
  }
  .btn-decrypt.invisible { visibility: hidden; pointer-events: none; }
  .btn-decrypt:hover { border-color: #ffcc00; color: #ffcc00; }
  .btn-decrypt:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Combo flash overlay */
  .combo-flash {
    position: absolute; inset: 0; z-index: 50; pointer-events: none;
    opacity: 0; transition: opacity 0.4s ease-out;
    border: 3px solid transparent; border-radius: 0;
  }
  .combo-flash.active { opacity: 1; }
  .combo-flash.green { background: radial-gradient(ellipse at center, #00ff8818 0%, transparent 70%); border-color: #00ff8844; }
  .combo-flash.cyan { background: radial-gradient(ellipse at center, #00ddff22 0%, transparent 70%); border-color: #00ddff66; }
  .combo-flash.gold { background: radial-gradient(ellipse at center, #ffcc0022 0%, transparent 70%); border-color: #ffcc0066; }
  .combo-flash.pink { background: radial-gradient(ellipse at center, #ff66ff22 0%, transparent 70%); border-color: #ff66ff66; }

  /* Pause overlay */
  .pause-overlay {
    display: none;
    position: absolute; inset: 0; z-index: 90;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    animation: overlayIn 0.2s ease-out;
  }
  .pause-overlay.active { display: flex; }
  .pause-title {
    font-size: 1.8rem; font-weight: 700; letter-spacing: 0.4em;
    color: #00ff88; text-shadow: 0 0 20px #00ff8866;
  }
  .pause-sub {
    font-size: 0.7rem; color: #00ff8866; letter-spacing: 0.15em;
  }

  /* Grid expand notification */
  .grid-expand-notify {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 60; pointer-events: none; text-align: center;
    opacity: 0; transition: opacity 0.3s;
  }
  .grid-expand-notify.active { opacity: 1; }
  .grid-expand-text {
    font-size: 1.2rem; font-weight: 700; letter-spacing: 0.3em;
    color: #00ddff; text-shadow: 0 0 20px #00ddff88;
  }
  .grid-expand-sub {
    font-size: 0.7rem; color: #00ddff88; letter-spacing: 0.15em; margin-top: 4px;
  }

  /* Score modal */
  .score-overlay {
    display: none;
    position: absolute; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center;
    animation: overlayIn 0.3s ease-out;
  }
  .score-overlay.active { display: flex; }
  .score-panel {
    background: linear-gradient(170deg, #0a1a10 0%, #0d2218 50%, #081510 100%);
    border: 1px solid #00ff8844;
    border-radius: 8px;
    padding: 20px 24px 16px;
    width: 88%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    box-shadow: 0 0 40px #00ff8822, 0 0 80px #00ff8811, inset 0 0 30px #00ff8808;
    animation: panelIn 0.4s ease-out;
    position: relative;
    overflow: hidden;
  }
  .score-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.02) 2px, rgba(0,255,136,0.02) 4px);
    pointer-events: none;
  }
  .score-panel-title {
    font-size: 1.1rem; font-weight: 700; letter-spacing: 0.3em;
    color: #00ff88; text-shadow: 0 0 15px #00ff8866;
    margin-bottom: 16px;
  }
  .score-row {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; padding: 6px 0;
    border-bottom: 1px solid #00ff8815;
    opacity: 0;
    animation: rowSlideIn 0.3s ease-out forwards;
  }
  .score-row:last-of-type { border-bottom: none; }
  .score-row-label {
    font-size: 0.7rem; letter-spacing: 0.15em; color: #00ff8888;
  }
  .score-row-value {
    font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em;
  }
  .score-row-value.green { color: #00ff88; text-shadow: 0 0 8px #00ff8844; }
  .score-row-value.cyan { color: #00ddff; text-shadow: 0 0 8px #00ddff44; }
  .score-row-value.yellow { color: #ffcc00; text-shadow: 0 0 8px #ffcc0044; }
  .score-row-value.pink { color: #ff66ff; text-shadow: 0 0 8px #ff66ff44; }
  .score-divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, #00ff8844, transparent);
    margin: 8px 0;
    opacity: 0;
    animation: rowSlideIn 0.3s ease-out forwards;
  }
  .score-total-row {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; padding: 8px 0 4px;
    opacity: 0;
    animation: rowSlideIn 0.3s ease-out forwards;
  }
  .score-total-label {
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.2em; color: #00ff88;
  }
  .score-total-value {
    font-size: 1.2rem; font-weight: 700; color: #00ff88;
    text-shadow: 0 0 12px #00ff8866;
  }
  .score-record {
    font-size: 0.75rem; color: #ffcc00; letter-spacing: 0.15em;
    animation: pulse 1s ease-in-out infinite; text-shadow: 0 0 10px #ffcc0066;
    margin-top: 6px;
    opacity: 0;
    animation: rowSlideIn 0.3s ease-out forwards, pulse 1s ease-in-out infinite 0.3s;
  }
  .score-btn {
    margin-top: 14px;
    background: transparent; border: 1px solid #00ff8866; border-radius: 4px;
    padding: 10px 32px; cursor: pointer; color: #00ff88;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.2em;
    font-family: 'Courier New', monospace; text-shadow: 0 0 8px #00ff8844;
    transition: all 0.2s;
    opacity: 0;
    animation: rowSlideIn 0.3s ease-out forwards;
  }
  .score-btn:hover { border-color: #00ff88; filter: brightness(1.3); }
  .score-btn:active { transform: scale(0.96); }

  @keyframes overlayIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes panelIn {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes rowSlideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Animations */
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes shakeX {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
  }
  @keyframes comboPopIn {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* Mobile adjustments */
  @media (max-height: 600px) {
    .grid-container { width: min(72vw, 56vh, 320px); height: min(72vw, 56vh, 320px); }
    .hud { padding: 8px 16px 2px; }
    .status-area { height: 40px; }
    .bottom-bar { height: 48px; }
    .score-panel { padding: 14px 18px 12px; }
  }
</style>
</head>
<body>

<div id="game">
  <div class="scanlines"></div>

  <!-- COMBO FLASH -->
  <div class="combo-flash" id="combo-flash"></div>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="logo-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="12" y="28" width="40" height="28" rx="4" stroke="#00ff88" stroke-width="2.5" fill="none"/>
          <path d="M22 28V20a10 10 0 0 1 20 0v8" stroke="#00ff88" stroke-width="2.5" fill="none"/>
          <circle cx="32" cy="42" r="4" fill="#00ff88"/>
          <line x1="32" y1="46" x2="32" y2="50" stroke="#00ff88" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="title" id="title-text">PATTERN</div>
      <div class="subtitle" id="subtitle-text">HACKER</div>
    </div>
    <p class="instructions">
      Watch the lines. Repeat the pattern.<br>
      Each level adds one more line.<br>
      You have 3 lives. Be fast for bonus points!
    </p>
    <div class="record-badge invisible" id="splash-record">BEST: <span id="splash-record-val">0</span></div>
    <button class="btn-main" id="btn-start">JACK IN</button>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn-small" id="btn-mute-sfx-splash">SFX ON</button>
      <button class="btn-small" id="btn-mute-music-splash">MUSIC ON</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="hud">
      <div class="hud-cell">
        <div class="hud-label">LEVEL</div>
        <div class="hud-value" id="hud-level">1</div>
      </div>
      <div class="hud-cell">
        <div class="hud-label">SCORE</div>
        <div class="hud-value" id="hud-score">0</div>
      </div>
      <div class="hud-cell">
        <div class="hud-label">GRID</div>
        <div class="hud-value" id="hud-grid">3x3</div>
      </div>
      <div class="hud-cell">
        <div class="hud-label">BEST</div>
        <div class="hud-value" id="hud-best" style="color:#ffcc00">0</div>
      </div>
    </div>

    <div class="lives" id="lives-display"></div>

    <div class="info-bar">
      <div class="combo-badge invisible" id="combo-badge">x1 COMBO</div>
      <div class="timer-display invisible" id="timer-display">10.0s</div>
    </div>

    <div class="bonus-bar">
      <div class="bonus-info invisible" id="bonus-info">COMBO BONUS: x2 | SPEED BONUS ACTIVE</div>
    </div>

    <div class="status-area">
      <div class="status-text" id="status-text"></div>
    </div>

    <div class="grid-container" id="grid-container">
      <svg class="grid-svg" id="grid-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <!-- Grid expand notification -->
    <div class="grid-expand-notify" id="grid-expand-notify">
      <div class="grid-expand-text" id="grid-expand-text">GRID EXPANDED: 4x4</div>
      <div class="grid-expand-sub">NEW NODES UNLOCKED</div>
    </div>

    <div class="progress-dots" id="progress-dots"></div>

    <div class="bottom-bar" id="bottom-bar">
      <button class="btn-decrypt invisible" id="btn-decrypt">DECRYPT (0)</button>
      <button class="btn-repeat invisible" id="btn-repeat">SHOW AGAIN</button>
      <button class="btn-main invisible" id="btn-retry">RETRY</button>
      <button class="btn-icon" id="btn-pause">&#x23F8;</button>
      <button class="btn-icon" id="btn-mute-sfx">SFX</button>
      <button class="btn-icon" id="btn-mute-music">MUS</button>
    </div>

    <!-- Pause overlay -->
    <div class="pause-overlay" id="pause-overlay">
      <div class="pause-title">PAUSED</div>
      <div class="pause-sub">SYSTEM STANDBY</div>
      <button class="btn-main" id="btn-resume">RESUME</button>
    </div>

    <!-- Score overlay -->
    <div class="score-overlay" id="score-overlay">
      <div class="score-panel" id="score-panel"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───
const MAX_GRID_SIZE = 6;
const SHOW_DELAY_BASE = 700;
const SHOW_DELAY_MIN = 350;
const SHOW_DELAY_DECAY = 25;
const MAX_LIVES = 3;
const BASE_TIME_LIMIT = 12;
const TIME_PER_NODE = 2.5;
const PERFECT_TIME_RATIO = 0.4;
const DECRYPT_EVERY_N_PERFECT = 3;
const DECRYPT_HINT_NODES = 3;

const OVERLAP_COLOR_SHOW = '#ff66ff';
const OVERLAP_COLOR_USER = '#ff66ff';

// ─── DYNAMIC GRID STATE ───
let gridSize = 3;
let nodes = gridSize * gridSize;
let nodePositions = computeNodePositions(gridSize);

function computeNodePositions(gs) {
  const n = gs * gs;
  return Array.from({ length: n }, (_, i) => ({
    row: Math.floor(i / gs),
    col: i % gs,
  }));
}

function recalcGrid(newSize) {
  gridSize = newSize;
  nodes = gridSize * gridSize;
  nodePositions = computeNodePositions(gridSize);
}

// ─── STATE ───
let state = 'idle';
let level = 1;
let pattern = [];
let userPattern = [];
let showIndex = -1;
let activeNode = -1;
let failNode = -1;
let score = 0;
let combo = 0;
let lives = MAX_LIVES;
let highScore = 0;
let isNewRecord = false;
let sfxMuted = false;
let musicMuted = false;
let repeatUsed = false;
let timerInterval = null;
let timeRemaining = 0;
let timeLimitForLevel = 0;
let showTimer = null;
let isDragging = false;
let pendingNextLevel = null;
let paused = false;
let pausedTimeRemaining = 0;
let perfectClears = 0;
let decryptCharges = 0;
let decryptUsedThisLevel = false;

// Lines stored as simple [from, to] arrays
let shownLineSegments = [];
let userLineSegments = [];

// Drag trail state
let dragTrailActive = false;
let dragTrailX = 0;
let dragTrailY = 0;

// ─── AUDIO ENGINE ───
class AudioEngine {
  constructor() { this.ctx = null; this.initialized = false; }
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch(e) {}
  }
  _play(freq, duration, type = 'sine', vol = 0.15, detune = 0) {
    if (!this.ctx || sfxMuted) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    if (detune) osc.detune.setValueAtTime(detune, now);
    gain.gain.setValueAtTime(vol, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(now);
    osc.stop(now + duration);
  }
  nodeShow(index) {
    const freq = 261 * Math.pow(2, (index % 12) / 12);
    this._play(freq, 0.3, 'sine', 0.12);
    this._play(freq * 1.5, 0.2, 'triangle', 0.05);
  }
  nodeInput(index) {

    this._play(freq, 0.15, 'square', 0.06);

  success() {
    [0, 100, 200].forEach((d, i) =>

    );
  }
  fail() {

  }
  levelUp() {

  newRecord() {

    );

  click() { this._play(800, 0.05, 'sine', 0.06); }
  lifeLost() {

// ─── SEGMENT OVERLAP DETECTION ───
function segmentKey(a, b) {
  return a < b ? `${a}-${b}` : `${b}-${a}`;
}

function findOverlappingSegments(pat) {
  const counts = {};
  for (let i = 1; i < pat.length; i++) {
    const key = segmentKey(pat[i - 1], pat[i]);
    counts[key] = (counts[key] || 0) + 1;
  }
  const overlaps = new Set();
  for (const [key, count] of Object.entries(counts)) {
    if (count > 1) overlaps.add(key);
  }
  return overlaps;
}

// ─── PATTERN GENERATION ───
function generatePattern(numLines) {
  const numNodes = numLines + 1;
  const pat = [];
  const first = Math.floor(Math.random() * nodes);
  pat.push(first);
  const used = new Set([first]);

  while (pat.length < numNodes) {
    const last = pat[pat.length - 1];
    const lp = nodePositions[last];

    const unused = [];
    const usedNodes = [];
    for (let i = 0; i < nodes; i++) {
      if (i === last) continue;
      if (!used.has(i)) unused.push(i);
      else usedNodes.push(i);
    }

    let pool = unused.length > 0 ? unused : usedNodes;
    if (pool.length === 0) break;

    const farChance = Math.min(0.7, 0.2 + (level - 1) * 0.06);
    const adjacent = [];
    const far = [];
    for (const i of pool) {
      const p = nodePositions[i];
      const isAdj = Math.abs(p.row - lp.row) <= 1 && Math.abs(p.col - lp.col) <= 1;
      if (isAdj) adjacent.push(i);
      else far.push(i);
    }

    let chosen;
    if (far.length > 0 && (adjacent.length === 0 || Math.random() < farChance)) {
      chosen = far[Math.floor(Math.random() * far.length)];
    } else if (adjacent.length > 0) {
      chosen = adjacent[Math.floor(Math.random() * adjacent.length)];
    } else {
      chosen = pool[Math.floor(Math.random() * pool.length)];
    }

    pat.push(chosen);
    used.add(chosen);
  }
  return pat;
}

function glitchText(el, text) {
  const chars = '01!@#$%^&*<>{}[]';
  let step = 0;
  el.textContent = text.split('').map(() => chars[Math.floor(Math.random() * chars.length)]).join('');
  const iv = setInterval(() => {
    step++;
    el.textContent = text.split('').map((c, i) =>
      i < step ? c : chars[Math.floor(Math.random() * chars.length)]
    ).join('');
    if (step >= text.length) clearInterval(iv);
  }, 35);
}

// ─── RENDER ───
let nodeEls = [];
function createGrid() {
  nodeEls.forEach(n => n.remove());
  nodeEls = [];
  const nodeSizePct = Math.max(7, 54 / gridSize);
  const maxPx = Math.round(180 / gridSize);

  for (let idx = 0; idx < nodes; idx++) {
    const pos = nodePositions[idx];
    const spacing = 100 / (gridSize + 1);
    const cx = spacing * (pos.col + 1);
    const cy = spacing * (pos.row + 1);
    const node = document.createElement('div');
    node.className = 'node';
    node.style.left = cx + '%';
    node.style.top = cy + '%';
    node.style.width = nodeSizePct + '%';
    node.style.height = nodeSizePct + '%';
    node.style.maxWidth = maxPx + 'px';
    node.style.maxHeight = maxPx + 'px';
    node.style.transform = 'translate(-50%, -50%) scale(1)';
    node.style.background = 'radial-gradient(circle at 40% 35%, #1a3a2a, #0a1a10)';
    node.style.border = '2.5px solid #00ff8855';
    node.style.boxShadow = 'none';
    node.dataset.idx = idx;

    const inner = document.createElement('div');
    inner.className = 'node-inner';
    inner.style.background = '#00ff8833';
    node.appendChild(inner);
    gridContainer.appendChild(node);
    nodeEls.push(node);
  }
}

function updateNode(idx, { color = '#1a3a2a', border = '#00ff8855', scale = 1, glow = 'none', innerColor = '#00ff8833' } = {}) {
  const node = nodeEls[idx];
  if (!node) return;
  node.style.background = `radial-gradient(circle at 40% 35%, ${color}, #0a1a10)`;
  node.style.border = `2.5px solid ${border}`;
  node.style.transform = `translate(-50%, -50%) scale(${scale})`;
  node.style.boxShadow = glow;
  node.style.cursor = state === 'input' ? 'pointer' : 'default';
  node.querySelector('.node-inner').style.background = innerColor;
}

function resetAllNodes() {
  for (let i = 0; i < nodes; i++) updateNode(i);
}

function renderLines(segments, baseColor, overlapColor, overlaps, width = 3, opacity = 1) {
  let html = '';
  const drawn = {};

  segments.forEach(([from, to]) => {
    const a = getNodeCenter(from);
    const b = getNodeCenter(to);
    html += `<line x1="${a.x}%" y1="${a.y}%" x2="${b.x}%" y2="${b.y}%"
      stroke="${baseColor}" stroke-width="${width}" stroke-linecap="round" opacity="${opacity}"
      style="filter:drop-shadow(0 0 4px ${baseColor})"/>`;
    const key = segmentKey(from, to);
    drawn[key] = (drawn[key] || 0) + 1;
  });

  const overlapDrawn = {};
  segments.forEach(([from, to]) => {
    const key = segmentKey(from, to);
    if (!overlaps.has(key)) return;
    const count = overlapDrawn[key] || 0;
    overlapDrawn[key] = count + 1;
    if (count === 0) return;
    const a = getNodeCenter(from);
    const b = getNodeCenter(to);
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const offset = 2.5 * count;
    const ox = (-dy / len) * offset;
    const oy = (dx / len) * offset;
    html += `<line x1="${a.x + ox}%" y1="${a.y + oy}%" x2="${b.x + ox}%" y2="${b.y + oy}%"
      stroke="${overlapColor}" stroke-width="${width + 1}" stroke-linecap="round" opacity="${opacity}"
      stroke-dasharray="6 4"
      style="filter:drop-shadow(0 0 6px ${overlapColor})"/>`;
  });

  return html;
}

function renderDragTrail() {
  if (!dragTrailActive || state !== 'input' || userPattern.length === 0) return '';
  const lastNode = userPattern[userPattern.length - 1];
  const a = getNodeCenter(lastNode);
  return `<line x1="${a.x}%" y1="${a.y}%" x2="${dragTrailX}%" y2="${dragTrailY}%"
    stroke="#00ff8844" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4"
    style="filter:drop-shadow(0 0 3px #00ff8833)"/>`;
}

function renderSvg() {
  let svg = '';
  if (state === 'showing') {
    const overlaps = findOverlappingSegments(pattern);
    svg += renderLines(shownLineSegments, '#00ddff', OVERLAP_COLOR_SHOW, overlaps, 3, 0.9);
  } else if (state === 'input' || state === 'success') {
    const overlaps = findOverlappingSegments(pattern);
    svg += renderLines(userLineSegments, '#00ff88', OVERLAP_COLOR_USER, overlaps, 3, 0.9);
    svg += renderDragTrail();
  } else if (state === 'fail' || state === 'gameover' || state === 'ghost') {
    const correctSegs = [];
    for (let i = 1; i < pattern.length; i++) correctSegs.push([pattern[i-1], pattern[i]]);
    const overlaps = findOverlappingSegments(pattern);
    svg += renderLines(correctSegs, '#ff3355', '#cc2266', overlaps, 2, 0.3);
    svg += renderLines(userLineSegments, '#ff3355', '#cc2266', overlaps, 3, 0.6);
    // Ghost lines
    if (state === 'ghost' && ghostLineSegments.length > 0) {
      svg += renderLines(ghostLineSegments, '#00ddff', '#00ddff', new Set(), 3, 0.7);
    }
  }
  gridSvg.innerHTML = svg;
}

// ─── TIMER ───
function getTimeLimitForLevel(lvl) {
  const numLines = lvl + 1;
  return Math.max(5, BASE_TIME_LIMIT + (numLines - 2) * TIME_PER_NODE - (lvl - 1) * 0.3);
}

function startTimer() {
  stopTimer();
  timeLimitForLevel = getTimeLimitForLevel(level);
  timeRemaining = timeLimitForLevel;
  timerDisplay.classList.remove('invisible', 'warning', 'danger');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if (paused) return;
    timeRemaining = Math.max(0, timeRemaining - 0.1);
    updateTimerDisplay();
    if (timeRemaining <= 0) {
      stopTimer();
      handleFail(-1);
    }
  }, 100);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  timerDisplay.textContent = `${timeRemaining.toFixed(1)}s`;
  timerDisplay.classList.remove('warning', 'danger');
  const ratio = timeRemaining / timeLimitForLevel;
  if (ratio < 0.25) timerDisplay.classList.add('danger');
  else if (ratio < 0.5) timerDisplay.classList.add('warning');
}

function calculateTimeBonusPoints() {
  const secsLeft = timeRemaining;
  const perSec = 5 + level * 3;
  const raw = Math.floor(secsLeft * perSec);
  return Math.max(0, raw);
}

function getTimeBonusLabel(secsLeft, timeLimit) {
  const ratio = secsLeft / timeLimit;
  if (ratio >= 0.6) return 'PERFECT';
  if (ratio >= 0.4) return 'FAST';
  if (ratio >= 0.2) return 'GOOD';
  return 'STANDARD';
}

  btnRetry.classList.add('invisible');
  timerDisplay.classList.add('invisible');

  // Clean up any lingering new-record elements
  const oldRecs = statusText.parentElement.querySelectorAll('.new-record');
  oldRecs.forEach(el => el.remove());

  statusText.innerHTML = '';
  glitchText(statusText, 'DECRYPTING...');
  statusText.style.color = '#00ddff';

  const showDelay = Math.max(SHOW_DELAY_MIN, SHOW_DELAY_BASE - (level - 1) * SHOW_DELAY_DECAY);
  let i = 0;

  showTimer = setTimeout(function step() {
    if (i < pat.length) {
      const curr = i;
      showIndex = curr;
      activeNode = pat[curr];
      if (curr > 0) {
        const prevIdx = pat[curr - 1];
        updateNode(prevIdx, { color: '#00ddff44', border: '#00ddff66', scale: 1, glow: 'none', innerColor: '#00ddff66' });
      }
      updateNode(pat[curr], {
        color: '#00ddff', border: '#00ddff', scale: 1.3,
        glow: '0 0 20px #00ddff, 0 0 40px #00ddff55', innerColor: '#00ddff'
      });
      if (!sfxMuted) audio.nodeShow(pat[curr]);
      if (curr > 0) {
        shownLineSegments.push([pat[curr - 1], pat[curr]]);
      }
      renderSvg();
      i++;
      showTimer = setTimeout(step, showDelay);
    } else {
      showTimer = setTimeout(() => {
        showIndex = -1;
        activeNode = -1;
        shownLineSegments = [];
        resetAllNodes();
        renderSvg();
        if (onComplete) onComplete();
      }, 600);
    }
  }, 500);
}

function enterInputState() {
  state = 'input';
  const numLines = pattern.length - 1;
  statusText.innerHTML = `REPEAT PATTERN (0/${numLines} LINES)`;
  statusText.style.color = '#00ff88';
  updateProgressDots();
  updateCombo();
  updateBonusInfo();
  updateDecryptButton();
  startTimer();
  btnPause.disabled = false; btnPause.style.opacity = '1';
  if (!repeatUsed) {
    btnRepeat.classList.remove('invisible');
    btnRepeat.disabled = false;
  } else {
    btnRepeat.classList.add('invisible');
  }
  for (let i = 0; i < nodes; i++) nodeEls[i].style.cursor = 'pointer';
}

// ─── DECRYPT POWER-UP ───
function handleDecrypt() {
  if (state !== 'input' || decryptCharges <= 0 || userPattern.length > 0 || decryptUsedThisLevel) return;
  decryptCharges--;
  decryptUsedThisLevel = true;
  if (!sfxMuted) audio.decrypt();
  haptic(30);

  const hintCount = Math.min(DECRYPT_HINT_NODES, pattern.length);
  let hintIdx = 0;

  function applyNextHint() {
    if (hintIdx >= hintCount) {
      updateDecryptButton();
      return;
    }
    const nodeIdx = pattern[hintIdx];
    userPattern.push(nodeIdx);
    if (hintIdx > 0) {
      userLineSegments.push([pattern[hintIdx - 1], nodeIdx]);
    }
    updateNode(nodeIdx, {
      color: '#ffcc00', border: '#ffcc00', scale: 1.15,
      glow: '0 0 12px #ffcc00', innerColor: '#ffcc00'
    });
    activeNode = nodeIdx;
    renderSvg();
    const linesDrawn = Math.max(0, userPattern.length - 1);
    const totalLines = pattern.length - 1;
    statusText.textContent = `REPEAT PATTERN (${linesDrawn}/${totalLines} LINES)`;
    updateProgressDots();
    hintIdx++;
    setTimeout(applyNextHint, 200);
  }

  applyNextHint();
  btnDecrypt.classList.add('invisible');
}

// ─── START ───
function startGame() {
  audio.init();
  initMusic();
  if (!sfxMuted) audio.click();
  splash.classList.add('hidden');
  gameScreen.classList.add('active');
  score = 0;
  combo = 0;
  lives = MAX_LIVES;
  isNewRecord = false;
  perfectClears = 0;
  decryptCharges = 0;
  decryptUsedThisLevel = false;
  recalcGrid(3);
  createGrid();
  updateLives();
  startLevel(1);
  playMusic();
}

function startLevel(lvl) {
  clearTimeout(showTimer);
  level = lvl;
  repeatUsed = false;
  decryptUsedThisLevel = false;
  const pat = generatePattern(lvl + 1);
  pattern = pat;
  updateHud();
  showPatternSequence(pat, enterInputState);
}

// ─── INPUT HANDLING ───
function handleNodeClick(idx) {
  if (state !== 'input' || paused) return;
  const nextIndex = userPattern.length;

  if (pattern[nextIndex] !== idx) {
    if (!sfxMuted) audio.nodeInput(idx);
    haptic([50, 30, 100]);
    handleFail(idx);
    return;
  }

  if (!sfxMuted) audio.nodeInput(idx);
  haptic(30);
  userPattern.push(idx);

  if (nextIndex > 0) {
    userLineSegments.push([pattern[nextIndex - 1], idx]);
  }

  updateNode(idx, {
    color: '#00ff88', border: '#00ff88', scale: 1.15,
    glow: '0 0 12px #00ff88', innerColor: '#00ff88'
  });
  activeNode = idx;
  renderSvg();
  const linesDrawn = Math.max(0, userPattern.length - 1);
  const totalLines = pattern.length - 1;
  statusText.textContent = `REPEAT PATTERN (${linesDrawn}/${totalLines} LINES)`;
  updateProgressDots();
  updateDecryptButton();

  if (userPattern.length === pattern.length) {
    // SUCCESS
    stopTimer();
    dragTrailActive = false;
    state = 'success';
    btnPause.disabled = true; btnPause.style.opacity = '0.3';
    const newCombo = combo + 1;
    combo = newCombo;

    const timeUsed = timeLimitForLevel - timeRemaining;
    const timeBonusPoints = calculateTimeBonusPoints();
    const timeBonusLabel = getTimeBonusLabel(timeRemaining, timeLimitForLevel);
    const baseScore = level * 100;
    const comboMultiplier = newCombo;
    const comboScore = Math.round(baseScore * comboMultiplier);
    const levelScore = comboScore + timeBonusPoints;
    score += levelScore;

    // Track perfect clears for decrypt charges
    if (!repeatUsed && !decryptUsedThisLevel) {
      perfectClears++;
      if (perfectClears >= DECRYPT_EVERY_N_PERFECT) {
        perfectClears = 0;
        decryptCharges++;
      }
    } else {
      perfectClears = 0;
    }

    // Extra life every 3 levels
    let earnedExtraLife = false;
    if (level % 3 === 0 && lives < MAX_LIVES + 3) {
      lives++;
      earnedExtraLife = true;
      updateLives();
    }

    const uniqueNodes = [...new Set(pattern)];
    uniqueNodes.forEach(n => updateNode(n, {
      color: '#00ff88', border: '#00ff88', scale: 1,
      glow: '0 0 16px #00ff88', innerColor: '#00ff88'
    }));

    if (!sfxMuted) audio.success();

    // Combo milestone flash
    if (newCombo >= 10 && newCombo % 5 === 0) triggerComboFlash(10);
    else if (newCombo === 5) triggerComboFlash(5);
    else if (newCombo === 3) triggerComboFlash(3);

    glitchText(statusText, 'ACCESS GRANTED');
    statusText.style.color = '#00ff88';

    let isNewRec = false;
    if (score > highScore) {
      highScore = score;
      isNewRecord = true;
      isNewRec = true;
      saveHighScore(score);
      if (!sfxMuted) setTimeout(() => audio.newRecord(), 400);
    } else if (!sfxMuted) {
      setTimeout(() => audio.levelUp(), 300);
    }

    updateHud();
    updateCombo();
    btnRepeat.classList.add('invisible');
    btnDecrypt.classList.add('invisible');
    timerDisplay.classList.add('invisible');

    // Check grid expansion
    const gridExpanded = checkGridExpansion();

    setTimeout(() => {
      showScoreModal({
        levelNum: level,
        baseScore,
        comboMultiplier,
        comboScore,
        timeBonusPoints,
        timeBonusLabel,
        totalScore: levelScore,
        timeUsed,
        timeLimit: timeLimitForLevel,
        newRecord: isNewRec,
        gridExpanded,
        earnedExtraLife,
        onContinue: () => {
          startLevel(level + 1);
        }
      });
    }, 800);
  }
}

// ─── GHOST REPLAY ───
function showGhostReplay(fromIndex, onComplete) {
  state = 'ghost';
  ghostLineSegments = [];
  renderSvg();

  const ghostDelay = 300;
  let i = fromIndex;

  function step() {
    if (i >= pattern.length) {
      showTimer = setTimeout(() => {
        ghostLineSegments = [];
        if (onComplete) onComplete();
      }, 800);
      return;
    }

    const nodeIdx = pattern[i];
    updateNode(nodeIdx, {
      color: '#00ddff55', border: '#00ddff88', scale: 1.1,
      glow: '0 0 10px #00ddff44', innerColor: '#00ddff66'
    });
    if (!sfxMuted) audio.nodeShow(nodeIdx);

    if (i > fromIndex) {
      ghostLineSegments.push([pattern[i - 1], nodeIdx]);
    } else if (i === fromIndex && fromIndex > 0) {
      // Mark the starting node more visibly
      updateNode(nodeIdx, {
        color: '#00ddff77', border: '#00ddffaa', scale: 1.2,
        glow: '0 0 14px #00ddff66', innerColor: '#00ddff88'
      });
    }

    renderSvg();
    i++;
    showTimer = setTimeout(step, ghostDelay);
  }

  showTimer = setTimeout(step, 400);
}

function handleFail(idx) {
  stopTimer();
  dragTrailActive = false;
  lives--;
  updateLives();
  btnPause.disabled = true; btnPause.style.opacity = '0.3';

  if (idx >= 0) {
    failNode = idx;
    updateNode(idx, {
      color: '#ff3355', border: '#ff3355', scale: 1.3,
      glow: '0 0 20px #ff3355', innerColor: '#ff3355'
    });
  }

  const uniqueInPattern = [...new Set(pattern)];
  uniqueInPattern.forEach(n => {
    if (n !== idx) {
      updateNode(n, { color: '#ff335555', border: '#ff335588', innerColor: '#ff335555' });
    }
  });

  combo = 0;
  perfectClears = 0;
  updateCombo();
  renderSvg();
  btnRepeat.classList.add('invisible');
  btnDecrypt.classList.add('invisible');
  timerDisplay.classList.add('invisible');
  bonusInfo.classList.add('invisible');

  gridContainer.style.animation = 'shakeX 0.4s ease-out';
  setTimeout(() => gridContainer.style.animation = '', 400);

  if (lives <= 0) {
    state = 'gameover';
    if (!sfxMuted) audio.fail();
    haptic([100, 50, 150]);

    statusText.innerHTML = '';
    glitchText(statusText, 'SYSTEM BREACH FAILED');
    statusText.style.color = '#ff3355';

    if (score > highScore) {
      highScore = score;
      isNewRecord = true;
      saveHighScore(score);
    }

    setTimeout(() => {
      if (isNewRecord) {
        const rec = document.createElement('div');
        rec.className = 'new-record';
        rec.style.color = '#ffcc00';
        rec.textContent = `\u2605 NEW RECORD: ${highScore.toLocaleString()} \u2605`;
        statusText.parentElement.appendChild(rec);
      }
    }, 300);

    updateHud();
    btnRetry.classList.remove('invisible');
    btnRetry.textContent = 'RETRY';
  } else {
    state = 'fail';
    if (!sfxMuted) audio.lifeLost();
    haptic([50, 30, 100]);

    statusText.innerHTML = '';
    glitchText(statusText, `ACCESS DENIED \u2014 ${lives} ${lives === 1 ? 'LIFE' : 'LIVES'} LEFT`);
    statusText.style.color = '#ff3355';

    updateHud();

    // Ghost replay: show what was missing from last correct node
    const lastCorrectIdx = userPattern.length;
    if (lastCorrectIdx > 0 && lastCorrectIdx < pattern.length) {
      // Start ghost from the last node the user got right
      showTimer = setTimeout(() => {
        showGhostReplay(lastCorrectIdx - 1, () => {
          resetAllNodes();
          renderSvg();
          repeatUsed = false;
          showPatternSequence(pattern, enterInputState);
        });
      }, 1500);
    } else {
      // User got 0 nodes or somehow completed - just re-show
      showTimer = setTimeout(() => {
        resetAllNodes();
        renderSvg();
        repeatUsed = false;
        showPatternSequence(pattern, enterInputState);
      }, 2000);
    }
  }
}

// ─── REPEAT PATTERN ───
function handleRepeat() {
  if (state !== 'input' || repeatUsed || paused) return;
  repeatUsed = true;
  stopTimer();
  btnRepeat.classList.add('invisible');
  btnDecrypt.classList.add('invisible');
  timerDisplay.classList.add('invisible');
  btnPause.disabled = true; btnPause.style.opacity = '0.3';
  dragTrailActive = false;

  userPattern = [];
  userLineSegments = [];
  resetAllNodes();
  renderSvg();

  showPatternSequence(pattern, enterInputState);
}

// ─── TOUCH / DRAG ───
let lastDragNode = -1;

function getNodeFromPoint(clientX, clientY) {
  const rect = gridContainer.getBoundingClientRect();
  const spacing = rect.width / (gridSize + 1);
  const tolerance = spacing * (gridSize <= 4 ? 0.28 : 0.32);
  for (let i = 0; i < nodes; i++) {
    const p = nodePositions[i];
    const cx = rect.left + spacing * (p.col + 1);
    const cy = rect.top + spacing * (p.row + 1);
    const dist = Math.sqrt((clientX - cx) ** 2 + (clientY - cy) ** 2);
    if (dist < tolerance) return i;
  }
  return -1;
}

function clientToSvgPercent(clientX, clientY) {
  const rect = gridContainer.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / rect.width * 100,
    y: (clientY - rect.top) / rect.height * 100
  };
}

function getNodesOnLineBetween(a, b) {
  const result = new Set();
  if (a === b) return result;
  const pa = nodePositions[a];
  const pb = nodePositions[b];
  const dr = pb.row - pa.row;
  const dc = pb.col - pa.col;
  for (let i = 0; i < nodes; i++) {
    if (i === a || i === b) continue;
    const pi = nodePositions[i];
    const dr_i = pi.row - pa.row;
    const dc_i = pi.col - pa.col;
    if (dr * dc_i - dc * dr_i !== 0) continue;
    const dot_ab = dr * dr + dc * dc;
    const dot_ai = dr_i * dr + dc_i * dc;
    if (dot_ai > 0 && dot_ai < dot_ab) {
      result.add(i);
    }
  }
  return result;
}

function handleDragNode(node) {
  if (node < 0 || node === lastDragNode || state !== 'input' || paused) return;
  lastDragNode = node;
  const nextIndex = userPattern.length;
  if (nextIndex >= pattern.length) return;

  const expectedNode = pattern[nextIndex];

  if (node === expectedNode) {
    handleNodeClick(node);
    return;
  }

  if (nextIndex > 0) {
    const lastConfirmed = pattern[nextIndex - 1];
    const passThrough = getNodesOnLineBetween(lastConfirmed, expectedNode);
    if (passThrough.has(node)) {
      return;
    }
  }

  handleNodeClick(node);
}

function updateDragTrail(clientX, clientY) {
  if (state !== 'input' || !isDragging || userPattern.length === 0) {
    dragTrailActive = false;
    return;
  }
  const pos = clientToSvgPercent(clientX, clientY);
  dragTrailX = pos.x;
  dragTrailY = pos.y;
  dragTrailActive = true;
  renderSvg();
}

function handleRelease() {
  if (!isDragging) return;
  isDragging = false;
  lastDragNode = -1;
  dragTrailActive = false;
  renderSvg();
  if (state === 'input' && userPattern.length > 0 && userPattern.length < pattern.length) {
    handleFail(-1);
  }
}

// --- Mouse ---
gridContainer.addEventListener('mousedown', (e) => {
  if (state !== 'input' || paused) return;
  isDragging = true;
  lastDragNode = -1;
  const node = getNodeFromPoint(e.clientX, e.clientY);
  if (node >= 0) handleDragNode(node);
  updateDragTrail(e.clientX, e.clientY);
});
gridContainer.addEventListener('mousemove', (e) => {
  if (!isDragging || state !== 'input' || paused) return;
  const node = getNodeFromPoint(e.clientX, e.clientY);
  if (node >= 0) handleDragNode(node);
  updateDragTrail(e.clientX, e.clientY);
});
gridContainer.addEventListener('mouseup', handleRelease);
gridContainer.addEventListener('mouseleave', handleRelease);

// --- Touch ---
gridContainer.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state !== 'input' || paused) return;
  isDragging = true;
  lastDragNode = -1;
  const t = e.touches[0];
  const node = getNodeFromPoint(t.clientX, t.clientY);
  if (node >= 0) handleDragNode(node);
  updateDragTrail(t.clientX, t.clientY);
}, { passive: false });
gridContainer.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDragging || state !== 'input' || paused) return;
  const t = e.touches[0];
  const node = getNodeFromPoint(t.clientX, t.clientY);
  if (node >= 0) handleDragNode(node);
  updateDragTrail(t.clientX, t.clientY);
}, { passive: false });
gridContainer.addEventListener('touchend', (e) => {
  e.preventDefault();
  handleRelease();
}, { passive: false });

// ─── BUTTON HANDLERS ───
$('btn-start').addEventListener('click', startGame);
btnRetry.addEventListener('click', () => {
  clearTimeout(showTimer);
  if (!sfxMuted) audio.click();
  stopMusic();
  score = 0; combo = 0; lives = MAX_LIVES; isNewRecord = false;
  perfectClears = 0; decryptCharges = 0; decryptUsedThisLevel = false;
  paused = false;
  pauseOverlay.classList.remove('active');
  // Clean up new-record elements
  statusText.parentElement.querySelectorAll('.new-record').forEach(el => el.remove());
  recalcGrid(3);
  createGrid();
  btnRetry.classList.add('invisible');
  hideScoreModal();
  startLevel(1);
  updateLives();
  playMusic();
});
btnRepeat.addEventListener('click', handleRepeat);
btnDecrypt.addEventListener('click', handleDecrypt);
btnPause.addEventListener('click', doPause);
$('btn-resume').addEventListener('click', doResume);
$('btn-mute-sfx').addEventListener('click', () => { audio.init(); toggleSfx(); });
$('btn-mute-music').addEventListener('click', () => { toggleMusic(); });
$('btn-mute-sfx-splash').addEventListener('click', () => { audio.init(); toggleSfx(); });
$('btn-mute-music-splash').addEventListener('click', () => { initMusic(); toggleMusic(); });

// ─── INIT ───
function init() {
  sfxMuted = localStorage.getItem('ph-sfx-muted') === '1';
  musicMuted = localStorage.getItem('ph-music-muted') === '1';
  updateSfxButtons();
  updateMusicButtons();
  loadHighScore();
  createGrid();
  glitchText($('title-text'), 'PATTERN');
  setTimeout(() => glitchText($('subtitle-text'), 'HACKER'), 200);
}
init();
</script>
